server:
  port: 8082

spring:
  application:
    name: blog-login-module

  config:
   import: optional:configserver:http://localhost:8888
  shardingsphere:
    datasource:
      names: ds-master, ds-replica

      ds-master:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://localhost:3306/blog_login_1?useSSL=false&serverTimezone=UTC
        username: root
        password: 12345

      ds-replica:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://localhost:3306/blog_login_2?useSSL=false&serverTimezone=UTC
        username: root
        password: 12345

    rules:
      readwrite-splitting:
        data-sources:
          user_ds:
            type: Static
            props:
              write-data-source-name: ds-master
              read-data-source-names: ds-replica

      sharding:
        tables:

          user:
            actual-data-nodes: user_ds.user_$->{0..1}
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: user-inline

          otp_token:
            actual-data-nodes: user_ds.otp_token_$->{0..1}
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: otp-inline

          refresh_token:
            actual-data-nodes: user_ds.refresh_token_$->{0..1}
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: refresh-inline

        sharding-algorithms:
          user-inline:
            type: INLINE
            props:
              algorithm-expression: user_$->{id % 2}

          otp-inline:
            type: INLINE
            props:
              algorithm-expression: otp_token_$->{id % 2}

          refresh-inline:
            type: INLINE
            props:
              algorithm-expression: refresh_token_$->{id % 2}

    props:
      sql-show: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  data:
   redis:
     host: localhost
     port: 6379
     timeout: 6000

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  access-token-validity: 900000
  refresh-token-validity: 604800000

logging:
  level:
    root: INFO
    org.apache.shardingsphere: DEBUG
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
     defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
     exposure:
      include: "*"