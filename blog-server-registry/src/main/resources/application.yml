spring:
  application:
    name: SERVER-REGISTRY
  profiles:
    active: git
  config:
    import: "optional:configserver:http://0.0.0.0:8671/eureka/"
  rabbit-mq:
    host: 0.0.0.0
    port: 5762
    username: guest
    password: guest
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
server:
  port: 8888
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false  