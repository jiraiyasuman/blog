spring:
  application:
    name: GATEWAY-SERVER

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

info:
  app:
    name: gatewayserver
    description: Blog Post/Like/Comment Gateway Server Application
    version: 1.0.0

logging:
  level:
    com.blog.blog_api_gateway: DEBUG